<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My Notes</h1>
        </header>

        <!-- Note Input Form -->
        <div class="note-form">
            <textarea id="note-input" placeholder="Yahan apna note likhein..."></textarea>
            <button id="add-btn">Add Note</button>
        </div>

        <!-- Notes Display Area -->
        <div id="notes-container" class="notes-grid">
            <!-- Notes JS se yahan dynamic add honge -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
