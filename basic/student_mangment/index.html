<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Result Management</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📊 Student Result Management</h1>
  <p class="subtitle">Add student marks and instantly view calculated results</p>

  <div class="card">
    <div class="form-grid">
      <div>
        <label for="name">Student Name</label>
        <input type="text" id="name" placeholder="e.g. Riya Shah">
      </div>
      <div>
        <label for="m1">Subject 1 Marks</label>
        <input type="number" id="m1" placeholder="0-100">
      </div>
      <div>
        <label for="m2">Subject 2 Marks</label>
        <input type="number" id="m2" placeholder="0-100">
      </div>
      <div>
        <label for="m3">Subject 3 Marks</label>
        <input type="number" id="m3" placeholder="0-100">
      </div>
    </div>
    <button class="btn-add" onclick="addStudent()">+ Add Student</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Sub 1</th>
          <th>Sub 2</th>
          <th>Sub 3</th>
          <th>Total</th>
          <th>Percentage</th>
          <th>Grade</th>
          <th>Result</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="resultBody">
        <tr><td colspan="9" class="empty">No students added yet</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
